CONFIG_GPIO=y

# Enable the Shell and the UART console
CONFIG_SHELL=y
CONFIG_UART_CONSOLE=y
# (Optional) Change the shell prompt from "uart:~$" to something custom
CONFIG_SHELL_PROMPT_UART="blackpill:~$ "

# Enable PWM for both IN and OUT
CONFIG_PWM=y

# Configure PWM Capture for Pwm IN
CONFIG_PWM_CAPTURE=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

#Configure Uart with Interrupt Driven
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y